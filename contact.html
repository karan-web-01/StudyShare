<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | StudyShare</title>
    <meta name="description" content="Contact StudyShare for support and feedback.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">📚 StudyShare</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="upload.html">Upload Notes</a></li>
                <li><a href="browse.html">Browse Notes</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main class="section">
        <h1>Contact</h1>
        <form class="contact-form" onsubmit="msgDone(); return false;">
            <div class="form-group">
                <label for="contact-name">Name</label>
                <input id="contact-name" name="name" type="text" placeholder="Name" required>
            </div>
            <div class="form-group">
                <label for="contact-email">Email</label>
                <input id="contact-email" name="email" type="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <label for="contact-message">Message</label>
                <textarea id="contact-message" name="message" rows="5" placeholder="Message" required></textarea>
            </div>
            <button class="btn" type="submit">Send Message</button>
        </form>
    </main>
    <footer>Designed by <strong>Karan Kumar</strong> • StudyShare © 2026</footer>
    <script src="script.js"></script>
</body>
</html>
